name: Debug Vercel Secrets

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        
      - name: Check secrets format
        run: |
          echo "VERCEL_TOKEN starts with: ${VERCEL_TOKEN:0:7}..."
          echo "VERCEL_ORG_ID: $VERCEL_ORG_ID"
          echo "VERCEL_PROJECT_ID: $VERCEL_PROJECT_ID"
          echo "Project directory contents:"
          ls -la oil-painting-app/
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          
      - name: Install and test Vercel CLI
        run: |
          npm install --global vercel@latest
          vercel --version
          cd oil-painting-app
          echo "Testing vercel whoami..."
          vercel whoami --token=${{ secrets.VERCEL_TOKEN }} || echo "Auth failed"